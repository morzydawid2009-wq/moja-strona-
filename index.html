<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<style>.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 240px;
}
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAV */
nav {
<button onclick="show('home')">Home</button>
<button onclick="show('store')">Store</button>

/* LEFT */
.left {
    display: flex;
    gap: 15px;
}

/* RIGHT */
.right {}

/* BUTTONY */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00c3ff;
}

/* DISCORD */
.discord {
    background: linear-gradient(135deg, #5865F2, #404EED);
}

.discord:hover {
    box-shadow: 0 0 15px #5865F2;
}

/* STRONY */
#home, #store {
    display: none;
    padding: 60px 20px;
    text-align: center;
}

.active {
    display: block;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 240px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 20px rgba(0,195,255,0.5);
}

.price {
    margin: 10px 0;
    font-size: 18px;
}

.buy {
    background: linear-gradient(135deg, #00c3ff, #0066ff);
    border-radius: 10px;
}

</style>

</head>

<body>

<nav>
    <div class="left">
        <button onclick="showHome()">Home</button>
        <button onclick="showStore()">Store</button>
    </div>

    <div class="right">
        <button class="discord" onclick="window.open('https://discord.gg/uBkNEQKHX')">
            Discord
        </button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="active">
    <h1>SourceSense</h1>
    <p>Undetected • Smooth • High Performance</p>
</div>

<!-- STORE -->
<div id="store">
    <h1>Our Products</h1>

    <div class="container">

        <div class="card">
            <h2>Basic</h2>
            <p class="price">$9.99</p>
            <button class="buy">Buy</button>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <p class="price">$19.99</p>
            <button class="buy">Buy</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <p class="price">$29.99</p>
            <button class="buy">Buy</button>
        </div>

    </div>
</div>
    <div class="card">
        <h2>Premium</h2>
        <p class="price">$29.99</p>
        <button class="buy">Buy</button>
    </div>

</div>

<script>
function show(page) {

    // ukryj wszystko
    document.getElementById("home").style.display = "none";
    document.getElementById("store").style.display = "none";

    // pokaż wybraną zakładkę
    document.getElementById(page).style.display = "block";
}

// startowo pokaz HOME
show("home");
</script>

</body>
</html>
