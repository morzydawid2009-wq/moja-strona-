<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #111, #050505);
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav a {
    color: #ccc;
    text-decoration: none;
    cursor: pointer;
    transition: 0.3s;
}

nav a:hover {
    color: #00c3ff;
}

/* SEKCJE */
section {
    padding: 100px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.8s ease;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

/* HERO */
#home h1 {
    font-size: 48px;
    background: linear-gradient(90deg, #00c3ff, #0066ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

/* CARD */
.card {
    background: rgba(20,20,20,0.7);
    padding: 25px;
    border-radius: 20px;
    width: 260px;
    transition: 0.4s;
    opacity: 0;
    transform: translateY(50px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: translateY(-12px) scale(1.05);
    box-shadow: 0 0 25px rgba(0,195,255,0.4);
}

/* BUTTON */
button {
    background: linear-gradient(135deg, #00c3ff, #0066ff);
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00c3ff;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
</style>

</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#store">Store</a>
    <a onclick="openLogin()">Login</a>
    <a href="https://discord.gg/uBkNEQKHX" target="_blank">Discord</a>
</nav>

<section id="home">
    <h1>Premium Digital Store</h1>
    <p>Najlepsze produkty cyfrowe 🔥</p>
</section>

<section id="store">
    <h1>Store</h1>

    <div class="container">

        <div class="card">
            <h2>Basic Pack</h2>
            <p>$9.99</p>
            <button>Kup teraz</button>
        </div>

        <div class="card">
            <h2>Pro Pack</h2>
            <p>$19.99</p>
            <button>Kup teraz</button>
        </div>

        <div class="card">
            <h2>Premium Pack</h2>
            <p>$29.99</p>
            <button>Kup teraz</button>
        </div>

    </div>
</section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>Login</h2>
        <input type="text" placeholder="Login">
        <input type="password" placeholder="Hasło">
        <button onclick="closeLogin()">Zaloguj</button>
    </div>
</div>

<script>
// LOGIN
function openLogin() {
    document.getElementById("loginModal").style.display = "flex";
}
function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

// ANIMACJE SCROLL
const sections = document.querySelectorAll("section");
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
    const trigger = window.innerHeight * 0.85;

    sections.forEach(sec => {
        if (sec.getBoundingClientRect().top < trigger) {
            sec.classList.add("show");
        }
    });

    cards.forEach(card => {
        if (card.getBoundingClientRect().top < trigger) {
            card.classList.add("show");
        }
    });
});

// START ANIMACJI NA WEJŚCIU
window.onload = () => {
    document.querySelector("#home").classList.add("show");
};
</script>

</body>
</html>
