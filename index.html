<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', monospace;
    background: #0d0d0d;
    color: white;
    overflow-x: hidden;
}

/* TŁO */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover no-repeat;
    filter: blur(8px);
    transform: scale(1.1);
    z-index: -2;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* PANEL */
.panel {
    background: rgba(20,20,20,0.8);
    border-radius: 12px;
    padding: 50px;
    width: 650px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(0,195,255,0.4);
    box-shadow: 0 0 30px rgba(0,195,255,0.4);
}

/* TEXT */
h1 {
    font-size: 32px;
    text-shadow: 0 0 10px #00c3ff;
    margin-bottom: 20px;
}

h2 {
    font-size: 18px;
    margin: 10px 0;
}

p {
    font-size: 10px;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 2;
}

.left {
    display: flex;
    gap: 10px;
}

/* BUTTONY */
button {
    padding: 8px 12px;
    border: 2px solid #00c3ff;
    border-radius: 4px;
    background: #1a1a1a;
    color: #00c3ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00c3ff;
    color: black;
}

.discord {
    background: linear-gradient(135deg, #5865F2, #404EED);
    border: none;
    color: white;
}

/* STRONY */
.page {
    display: none;
    position: relative;
    z-index: 2;
    padding: 60px 20px;
}

/* Wyśrodkowanie tylko dla home */
.home-page {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 60px); /* minus navbar */
}

.active {
    display: block;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 8px;
    width: 220px;
    transition: 0.3s;
    backdrop-filter: blur(8px);
    border: 2px solid #00c3ff;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 20px #00c3ff;
}

.price {
    margin: 8px 0;
}

.buy {
    background: #00c3ff;
    color: black;
    border: 2px solid #0066ff;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav>
    <div class="left">
        <button onclick="showPage('home')">HOME</button>
        <button onclick="showPage('store')">STORE</button>
    </div>

    <div>
        <button class="discord" onclick="window.open('https://discord.gg/uBkNEQKHX')">
            DISCORD
        </button>
    </div>
</nav>

<div id="home" class="page home-page active">
    <div class="panel">
        <h1>CS2 PREMIUM CHEATS</h1>
        <p>UNDETECTED • SMOOTH • HIGH PERFORMANCE</p>
        <p style="color:#00ff88;">● STATUS: UNDETECTED</p>
    </div>
</div>

<div id="store" class="page">
    <h1>OUR PRODUCTS</h1>

    <div class="container">
        <div class="card">
            <h2>GAMESENSE RELEASE</h2>
            <p class="price">$2.00</p>
            <button class="buy" onclick="window.open('https://buy.stripe.com/test_9B6cN50UcaCN6JS7bW0co00')">BUY</button>
        </div>

        <div class="card">
            <h2>PRO</h2>
            <p class="price">$19.99</p>
            <button class="buy" onclick="openBuy('Pro', '$19.99')">BUY</button>
        </div>

        <div class="card">
            <h2>PREMIUM</h2>
            <p class="price">$29.99</p>
            <button class="buy" onclick="openBuy('Premium', '$29.99')">BUY</button>
        </div>
    </div>
</div>

<div id="buyBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index: 5;
">

    <div style="
    background:#111;
    padding:30px;
    border-radius:12px;
    text-align:center;
    width:300px;
    ">

        <h2 id="productName"></h2>
        <p id="productPrice"></p>

        <button onclick="buyNow()">BUY NOW</button>
        <br><br>
        <button onclick="closeBuy()">CANCEL</button>

    </div>
</div>

<script>
function showPage(page) {
    document.getElementById("home").classList.remove("active");
    document.getElementById("store").classList.remove("active");
    document.getElementById(page).classList.add("active");
}

function openBuy(name, price) {
    document.getElementById("buyBox").style.display = "flex";
    document.getElementById("productName").innerText = name;
    document.getElementById("productPrice").innerText = price;
}

function closeBuy() {
    document.getElementById("buyBox").style.display = "none";
}

function buyNow() {
    alert("Purchase successful (fake)");
}
</script>

</body>
</html>
