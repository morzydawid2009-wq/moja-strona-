<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
}

/* LEWO */
.left {
    display: flex;
    gap: 15px;
}

/* PRAWO */
.right {}

/* BUTTONY */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00c3ff;
}

/* DISCORD */
.discord {
    background: linear-gradient(135deg, #5865F2, #404EED);
}

/* STRONY */
.page {
    display: none;
    padding: 60px 20px;
    text-align: center;
}

.active {
    display: block;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 240px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(0,195,255,0.5);
}

.price {
    margin: 10px 0;
}

.buy {
    background: linear-gradient(135deg, #00c3ff, #0066ff);
}
</style>

</head>

<body>

<nav>
    <div class="left">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('store')">Store</button>
    </div>

    <div class="right">
        <button class="discord" onclick="window.open('https://discord.gg/uBkNEQKHX')">
            Discord
        </button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
    <h1>CS2 Premium Cheats</h1>
    <p>Undetected • Smooth • High Performance</p>
</div>

<!-- STORE -->
<div id="store" class="page">
    <h1>Our Products</h1>

    <div class="container">

        <div class="card">
            <h2>Gamesense release</h2>
            <p class="price">$2.00</p>
            <button class="buy" onclick="window.open('https://buy.stripe.com/test_9B6cN50UcaCN6JS7bW0co00')">Buy</button>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <p class="price">$19.99</p>
            <button class="buy" onclick="openBuy('Pro', '$19.99')">Buy</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <p class="price">$29.99</p>
            <button class="buy" onclick="openBuy('Premium', '$29.99')">Buy</button>
        </div>

    </div>
</div>
<div id="buyBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
">

    <div style="
    background:#111;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:300px;
    ">

        <h2 id="productName"></h2>
        <p id="productPrice"></p>

        <button onclick="buyNow()">Buy Now</button>
        <br><br>
        <button onclick="closeBuy()">Cancel</button>

    </div>
</div>
<script>
function showPage(page) {
    document.getElementById("home").classList.remove("active");
    document.getElementById("store").classList.remove("active");

    document.getElementById(page).classList.add("active");
}
</script><script>
function openBuy(name, price) {
    document.getElementById("buyBox").style.display = "flex";
    document.getElementById("productName").innerText = name;
    document.getElementById("productPrice").innerText = price;
}

function closeBuy() {
    document.getElementById("buyBox").style.display = "none";
}

function buyNow() {
    alert("Purchase successful (fake)");
}
</script>

</body>
</html>
