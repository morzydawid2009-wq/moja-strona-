<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
}

.nav-left, .nav-center, .nav-right {
    display: flex;
    gap: 20px;
}

.nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

a {
    color: #ccc;
    text-decoration: none;
    cursor: pointer;
}

a:hover {
    color: #00c3ff;
}

/* SEKCJE */
section {
    padding: 80px 20px;
    text-align: center;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 250px;
    border: 1px solid rgba(255,255,255,0.05);
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    cursor: pointer;
}
</style>
</head>

<body>

<nav>
    <div class="nav-left">
        <a href="#">Login</a>
        <a href="#">Register</a>
    </div>

    <div class="nav-center">
        <a href="#home">Home</a>
        <a href="#store">Store</a>
    </div>

    <div class="nav-right">
        <a href="https://discord.gg/uBkNEQKHX" target="_blank">Discord</a>
    </div>
</nav>

<!-- HOME (TYLKO OPIS) -->
<section id="home">
    <h1>Premium Digital Store</h1>
    <p>Welcome to a modern digital store with smooth design and fast access.</p>
</section>

<!-- STORE (TU SĄ PRODUKTY) -->
<section id="store">
    <h1>Our Products</h1>

    <div class="container">
        <div class="card">
            <h2>Basic</h2>
            <p>$9.99</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <p>$19.99</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <p>$29.99</p>
            <button>Buy</button>
        </div>
    </div>
</section>

</body>
</html>
