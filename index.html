<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* (TWÓJ CSS BEZ ZMIAN) */
body {
    margin: 0;
    font-family: 'Press Start 2P', monospace;
    background: #0d0d0d;
    color: white;
    overflow-x: hidden;
    cursor: none;
}

/* ... cały CSS zostaje jak był ... */
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav>
    <div class="left">
        <button onclick="showPage('home')">HOME</button>
        <button onclick="showPage('store')">STORE</button>
    </div>

    <div>
        <button id="langBtn" onclick="toggleLang()">RU</button>
        <button class="discord" onclick="window.open('https://discord.gg/uBkNEQKHX')">DISCORD</button>
    </div>
</nav>

<div id="home" class="page home-page showing">
    <div class="panel">
        <h1>CS2 ПРЕМИУМ ЧИТЫ</h1>
        <p>НЕОБНАРУЖИМЫЕ • ПЛАВНЫЕ • ВЫСОКАЯ ПРОИЗВОДИТЕЛЬНОСТЬ</p>
        <p style="color:#00ff88;">● СТАТУС: НЕ ОБНАРУЖЕНЫ</p>
    </div>
</div>

<div id="store" class="page store-page">
    <h1>НАШИ ПРОДУКТЫ</h1>
    <div class="container">
        <div class="card">
            <h2>GAMESENSE RELEASE</h2>
            <p class="price">$2.00</p>
            <button class="buy" onclick="openBuy('Gamesense Release', '$2.00')">КУПИТЬ</button>
        </div>
        <div class="card">
            <h2>PRO</h2>
            <p class="price">$19.99</p>
            <button class="buy" onclick="openBuy('Pro', '$19.99')">КУПИТЬ</button>
        </div>
        <div class="card">
            <h2>PREMIUM</h2>
            <p class="price">$29.99</p>
            <button class="buy" onclick="openBuy('Premium', '$29.99')">КУПИТЬ</button>
        </div>
    </div>
</div>

<div id="buyBox">
    <div>
        <h2 id="productName"></h2>
        <p id="productPrice"></p>
        <button id="buyNowBtn" onclick="buyNow()">КУПИТЬ СЕЙЧАС</button>
        <br><br>
        <button onclick="closeBuy()">ОТМЕНИТЬ</button>
    </div>
</div>

<div class="cursor" id="cursor"></div>

<script>
const cursor = document.getElementById('cursor');
let lastTime = 0;

document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';

    const now = Date.now();
    if (now - lastTime < 30) return;
    lastTime = now;

    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';

    const dx = (Math.random() - 0.5) * 120 + 'px';
    const dy = (Math.random() - 0.5) * 120 + 'px';
    p.style.setProperty('--dx', dx);
    p.style.setProperty('--dy', dy);

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
});

function showPage(pageId) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => p.id === pageId ? p.classList.add('showing') : p.classList.remove('showing'));
}

let selectedProduct = "";

function openBuy(name, price) {
    document.getElementById("buyBox").style.display = "flex";
    document.getElementById("productName").innerText = name;
    document.getElementById("productPrice").innerText = price;
    selectedProduct = name;
}

function closeBuy() {
    document.getElementById("buyBox").style.display = "none";
}

// 🔥 STRIPE PODPIĘTY
function buyNow() {
    const stripeLink = "https://buy.stripe.com/test_9B6cN50UcaCN6JS7bW0co00";

    if (selectedProduct) {
        window.open(stripeLink, "_blank");
    } else {
        alert("No product selected");
    }
}

// LANGUAGE TOGGLE
let currentLang = "ru";

function toggleLang() {
    currentLang = currentLang === "ru" ? "en" : "ru";
    document.getElementById("langBtn").innerText = currentLang.toUpperCase();

    if (currentLang === "en") {
        document.querySelector("#home h1").innerText = "CS2 PREMIUM CHEATS";
        document.querySelector("#home p").innerText = "UNDETECTED • SMOOTH • HIGH PERFORMANCE";
        document.querySelector("#home p:nth-of-type(2)").innerText = "● STATUS: UNDETECTED";
        document.querySelector("#store h1").innerText = "OUR PRODUCTS";
        document.querySelectorAll('.buy').forEach(btn => btn.innerText = "BUY NOW");
        document.getElementById("buyNowBtn").innerText = "BUY NOW";
    } else {
        document.querySelector("#home h1").innerText = "CS2 ПРЕМИУМ ЧИТЫ";
        document.querySelector("#home p").innerText = "НЕОБНАРУЖИМЫЕ • ПЛАВНЫЕ • ВЫСОКАЯ ПРОИЗВОДИТЕЛЬНОСТЬ";
        document.querySelector("#home p:nth-of-type(2)").innerText = "● СТАТУС: НЕ ОБНАРУЖЕНЫ";
        document.querySelector("#store h1").innerText = "НАШИ ПРОДУКТЫ";
        document.querySelectorAll('.buy').forEach(btn => btn.innerText = "КУПИТЬ");
        document.getElementById("buyNowBtn").innerText = "КУПИТЬ СЕЙЧАС";
    }
}
</script>

</body>
</html>
