<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', monospace;
    background: #0d0d0d;
    color: white;
    overflow-x: hidden;
    cursor: none; /* ukrywa standardowy kursor */
}

/* TŁO */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover no-repeat;
    filter: blur(8px);
    transform: scale(1.1);
    z-index: -2;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* PANEL */
.panel {
    background: rgba(20,20,20,0.8);
    border-radius: 12px;
    padding: 50px;
    width: 650px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(0,195,255,0.4);
    box-shadow: 0 0 30px rgba(0,195,255,0.4);
}

/* TEXT */
h1 {
    font-size: 32px;
    text-shadow: 0 0 10px #00c3ff;
    margin-bottom: 20px;
}

h2 {
    font-size: 18px;
    margin: 10px 0;
}

p {
    font-size: 10px;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 2;
}

.left {
    display: flex;
    gap: 10px;
}

/* BUTTONY */
button {
    padding: 8px 12px;
    border: 2px solid #00c3ff;
    border-radius: 4px;
    background: #1a1a1a;
    color: #00c3ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer; /* pokaże systemowy cursor na przyciskach */
    transition: 0.2s;
}

button:hover {
    background: #00c3ff;
    color: black;
}

.discord {
    background: linear-gradient(135deg, #5865F2, #404EED);
    border: none;
    color: white;
}

/* STRONY Z PŁYNNYM PRZEJŚCIEM */
.page {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    min-height: calc(100vh - 60px);
    opacity: 0;
    transform: translateX(30px);
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.page.showing {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    z-index: 2;
}

/* Wyśrodkowanie panelu home */
.home-page {
    display: flex;
    justify-content: center;
    align-items: center;
}

.home-page .panel {
    margin: 0;
    text-align: center;
}

/* STORE */
.container {
    display: flex;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 20px;
    padding-left: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 8px;
    width: 220px;
    transition: 0.3s;
    backdrop-filter: blur(8px);
    border: 2px solid #00c3ff;
    text-align: center;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 20px #00c3ff;
}

.price {
    margin: 8px 0;
}

.buy {
    background: #00c3ff;
    color: black;
    border: 2px solid #0066ff;
    font-size: 10px;
}

/* BUY BOX */
#buyBox {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index: 5;
}

#buyBox div {
    background:#111;
    padding:30px;
    border-radius:12px;
    text-align:center;
    width:300px;
}

/* LOGO PRODUKTU */
.product-logo {
    width: 100%;
    max-width: 160px;
    display: block;
    margin: 0 auto 15px;
    filter: drop-shadow(0 0 10px #00c3ff);
    transition: 0.3s;
}

.product-logo:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 20px #00c3ff);
}

/* KURSOR I CZĄSTECZKI */
.cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    background: #00c3ff;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    box-shadow: 0 0 10px #00c3ff, 0 0 20px #00c3ff;
}

.particle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #00ffdd;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    opacity: 1;
    box-shadow: 0 0 8px #00ffdd, 0 0 15px #00ffdd;
    animation: particleAnim 0.6s forwards;
}

@keyframes particleAnim {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav>
    <div class="left">
        <button onclick="showPage('home')">HOME</button>
        <button onclick="showPage('store')">STORE</button>
    </div>

    <div>
        <button class="discord" onclick="window.open('https://discord.gg/uBkNEQKHX')">
            DISCORD
        </button>
    </div>
</nav>

<div id="home" class="page home-page showing">
    <div class="panel">
        <h1>CS2 PREMIUM CHEATS</h1>
        <p>UNDETECTED • SMOOTH • HIGH PERFORMANCE</p>
        <p style="color:#00ff88;">● STATUS: UNDETECTED</p>
    </div>
</div>

<div id="store" class="page store-page">
    <h1>OUR PRODUCTS</h1>

    <div class="container">
        <div class="card">
            <!-- LOGO GameSense nad pierwszym produktem -->
            <img src="https://gamesense.gg/cdn/shop/files/gamesense-logo_PNG_9316ec1d-7a16-4f57-ad96-e8c1d1a67711_1200x1200.png?v=1631953877" 
                 alt="GameSense Logo" 
                 class="product-logo">
            <h2>GAMESENSE RELEASE</h2>
            <p class="price">$2.00</p>
            <button class="buy" onclick="window.open('https://buy.stripe.com/test_9B6cN50UcaCN6JS7bW0co00')">BUY</button>
        </div>

        <div class="card">
            <h2>PRO</h2>
            <p class="price">$19.99</p>
            <button class="buy" onclick="openBuy('Pro', '$19.99')">BUY</button>
        </div>

        <div class="card">
            <h2>PREMIUM</h2>
            <p class="price">$29.99</p>
            <button class="buy" onclick="openBuy('Premium', '$29.99')">BUY</button>
        </div>
    </div>
</div>

<div id="buyBox">
    <div>
        <h2 id="productName"></h2>
        <p id="productPrice"></p>

        <button onclick="buyNow()">BUY NOW</button>
        <br><br>
        <button onclick="closeBuy()">CANCEL</button>
    </div>
</div>

<!-- CUSTOM CURSOR -->
<div class="cursor" id="cursor"></div>

<script>
const cursor = document.getElementById('cursor');
let lastTime = 0;

document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';

    const el = document.elementFromPoint(e.clientX, e.clientY);
    if(el && el.closest('button, a')) {
        cursor.style.display = 'none';
    } else {
        cursor.style.display = 'block';
    }

    const now = Date.now();
    if (now - lastTime < 30) return;
    lastTime = now;

    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    const dx = (Math.random() - 0.5) * 120 + 'px';
    const dy = (Math.random() - 0.5) * 120 + 'px';
    p.style.setProperty('--dx', dx);
    p.style.setProperty('--dy', dy);

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
});

function showPage(pageId) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => {
        if (p.id === pageId) {
            p.classList.add('showing');
        } else {
            p.classList.remove('showing');
        }
    });
}

function openBuy(name, price) {
    document.getElementById("buyBox").style.display = "flex";
    document.getElementById("productName").innerText = name;
    document.getElementById("productPrice").innerText = price;
}

function closeBuy() {
    document.getElementById("buyBox").style.display = "none";
}

function buyNow() {
    alert("Purchase successful (fake)");
}
</script>

</body>
</html>
